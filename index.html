<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroProjects</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b0c0e' width='100' height='100' rx='20'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px;
      transition: background 0.15s, color 0.15s;
    }

    .topbar {
      position: fixed;
      top: 0; right: 0;
      padding: 12px 20px;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--dim); }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }

    .tagline {
      color: var(--dim);
      font-size: 12px;
      margin-bottom: 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 800px;
    }

    .card {
      display: block;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--s2);
    }

    .card-icon { font-size: 28px; margin-bottom: 14px; }

    .card-name {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-desc { color: var(--dim); font-size: 11px; line-height: 1.6; }

    footer {
      margin-top: auto;
      padding-top: 60px;
      color: var(--dim);
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="btn-ghost" id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="logo">Micro<span>Projects</span></div>
  <div class="tagline">a collection of small tools</div>

  <div class="grid">
    <a class="card" href="/timepunch/">
      <div class="card-icon">⏱</div>
      <div class="card-name">TimePunch</div>
      <div class="card-desc">Track work hours with punch in/out. CSV import & export. Weekly balance against a 42h target.</div>
    </a>
  </div>

  <footer>PoznIT / MicroProjects</footer>

  <script src="/shared/theme.js"></script>
  <script>initTheme();</script>

</body>
</html>
