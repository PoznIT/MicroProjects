events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Use Docker's internal DNS for upstream resolution
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name _;

        # ── Auth subrequest (internal only) ──────────────────────────────
        location = /verify {
            internal;
            set $auth_upstream http://auth:3000;
            proxy_pass              $auth_upstream/verify;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
        }

        # ── Unprotected: login / logout / shared assets ───────────────────
        location /login {
            set $auth_upstream http://auth:3000;
            proxy_pass $auth_upstream;
        }

        location /logout {
            set $auth_upstream http://auth:3000;
            proxy_pass $auth_upstream;
        }

        location /shared/ {
            root /var/www;
            try_files $uri =404;
        }

        # ── Auth redirect target ──────────────────────────────────────────
        location @require_login {
            return 302 /login;
        }

        # ── Protected: landing page ───────────────────────────────────────
        location / {
            auth_request /verify;
            error_page 401 = @require_login;

            root /var/www;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # ── Protected: TimePunch ──────────────────────────────────────────
        location /timepunch/ {
            auth_request /verify;
            error_page 401 = @require_login;

            alias /var/www/TimePunch/;
            index index.html;
            try_files $uri $uri/ index.html;
        }
    }
}
