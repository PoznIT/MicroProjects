services:
  auth:
    build: ./infra/auth
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/verify"]
      interval: 5s
      retries: 3

  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./portal/index.html:/var/www/portal/index.html:ro
      - ./portal/shared:/var/www/portal/shared:ro
      - ./apps/TimePunch:/var/www/apps/TimePunch:ro
    depends_on:
      auth:
        condition: service_healthy
    restart: unless-stopped
