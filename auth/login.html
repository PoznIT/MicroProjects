<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroProjects — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b0c0e' width='100' height='100' rx='20'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%;
      max-width: 320px;
    }

    .logo {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .logo span { color: var(--accent); }

    .sub {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: var(--sans);
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    input[type="password"].error  { border-color: var(--red); }

    .error-msg {
      font-size: 11px;
      color: var(--red);
      margin-bottom: 14px;
      font-family: var(--sans);
      display: none;
    }
    .error-msg.visible { display: block; }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    button[type="submit"]:hover { background: var(--accent2); }

    .topbar {
      position: fixed;
      top: 0; right: 0;
      padding: 12px 20px;
    }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--dim); }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="btn-ghost" id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="card">
    <div class="logo">Micro<span>Projects</span></div>
    <div class="sub">sign in to continue</div>

    <form method="POST" action="/login">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="current-password"
        autofocus
        class="{{ 'error' if error }}"
      >
      <div class="error-msg" id="error-msg">Incorrect password.</div>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script src="/shared/theme.js"></script>
  <script>
    initTheme();
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('password').classList.add('error');
      document.getElementById('error-msg').classList.add('visible');
    }
  </script>
</body>
</html>
